format = """
[в•ӯв”Җ](fg:directory)$directory\
$git_branch$git_metrics$git_status\
$docker_context\
$fill\
$status\
$cmd_duration\
$jobs\
$shell\
$os\
[в”Җв•® ](fg:ubuntu)\
$line_break\
[в•°в•ҙ](fg:directory)\
[$character]($style)\
"""

right_format = """
[в•¶в•Ҝ](fg:ubuntu)\
"""

# add_newline = false

# Color Palette
palette = "Power10"

[palettes.Power10]
# colors
directory = 'cyan'
ubuntu = '#E95420'

# only lowercase names
greydimmed = '#424242'
greydarker = '#242424'
ossymbol = '#AAAAAA' # dimmed white
user = 'green'
userroot = 'red'
sshsymbol = 'green'
hostname = 'green'
python = 'yellow'
# git start ---
orangegit = '#E04D27'
conflicted = 'red'
ahead = 'yellow'
behind = 'yellow'
diverged = 'yellow'
uptodate = 'green'
untracked = 'red'
stashed = '#A52A2A' # redbrown
modified = '#C8AC00' # darker yellow
staged = 'green'
renamed = 'yellow'
deleted = 'orange'
# git end ---
jobs = 'blue'
memory = 'purple'
duration = 'yellow'
fill = '#424242' # greydimmed
status = 'red'
localip = 'green'
# shell = '#424242' # greydimmed

[directory]
format = "[ пҒј ]($style)[$read_only]($read_only_style)[$repo_root]($repo_root_style)[$path]($style)"
style = 'fg:directory bold'
home_symbol = "~"
read_only = "\uf023 " # \uf023 'п Ҫ '
read_only_style = 'red'
truncation_length = 3
truncation_symbol = 'вҖҰ/'
truncate_to_repo = false
use_os_path_sep = true
disabled = false

[git_branch]
format = "[ \ue0b1 $symbol$branch(:$remote_branch)]($style)" # \u3009 or u276f #\ueab6 \ue0b1
style = 'fg:orangegit' # NOTE: try something like purple
symbol = "\ue0a0" # \ue702 оңӮ
disabled = false

[git_status]
style = "fg:orangegit"
format = '([\[$all_status$ahead_behind\]]($style))'
stashed = "[$](fg:stashed) "
disabled = false

[fill]
style = 'fg:fill'
symbol = "\u2500" # "\u2500" "в”Җ" # no line: ' '

[status]
format = "[$symbol $hex_status( \uf0a2 $signal_number-$signal_name)]($style)" # \uf0a2 п–ӣ , \ueaa2
style = 'fg:status'
symbol = " \u2717" # \u2717 \uf467 \uebde оҜһ вңҳ
disabled = false

[cmd_duration]
format = "[\ueab5\uf017 $duration]($style)" # \ueab5 \uf017  оӮі п”ҹ
style = 'fg:duration'
min_time = 500
disabled = false

[jobs]
format = "[\ueab5](fg:jobs bold)[$symbol $number]($style)" # \u3009
style = 'fg:jobs'
symbol = "\ueb7b" # \ueb7b оӯ» \uef0c пҘӯ # 'пӘӮ' # 'у°ңҺ' # 'о®ў'
symbol_threshold = 1
number_threshold = 2
disabled = false

[shell]
format = "[\ueab5](fg:#FFB65E)[оҡ‘$indicator]($style)"
zsh_indicator = 'zsh'
bash_indicator = 'bash'
style = 'fg:#FFB65E bold'
disabled = false

# Customization and activation of some modules:
