#cloud-config
autoinstall:
  version: 1

  timezone: "America/New_York"

  identity:
    realname: "eloquencer"
    hostname: dev-machine
    username: eloquencer
    # WARN: use for hash generation: openssl passwd -6
    password: ""

  network:
    version: 2
    renderer: NetworkManager
    ethernets:
      wired:
        match:
          name: "en*"
        dhcp4: true
        nameservers:
          addresses:
            # IPv4
            - 1.1.1.2 # Cloudflare
            - 1.0.0.1 # "
            - 8.8.8.8 # Google
            - 8.8.4.4 # "
            - 9.9.9.9 # Quad9
            # # IPv6
            # - 2606:4700:4700::1111 # Cloudflare
            # - 2606:4700:4700::1001 # "
            # - 2001:4860:4860::8888 # Google
            # - 2001:4860:4860::8844 # "
        # Add these dns servers to wifi too
  storage:
    config:
      - id: disk0
        type: disk
        match:
          size: largest
        ptable: gpt
        wipe: superblock-recursive
        grub_device: true

      # BIOS GRUB partition (required for GPT + BIOS)
      - id: bios-grub
        type: partition
        device: disk0
        size: 1M
        flag: bios_grub

      # Root partition (rest of disk)
      - id: root-partition
        type: partition
        device: disk0
        size: -1

      # Format as ext4
      - id: root-format
        type: format
        fstype: ext4
        volume: root-partition

      # Mount root
      - id: root-mount
        type: mount
        path: /
        device: root-format
        options: "noatime,errors=remount-ro"
    
    # Keep to Ext4 but check better config
    # For UEFI
    # config:
    #   - id: disk0
    #     type: disk
    #     match:
    #       size: largest
    #     ptable: gpt
    #     wipe: superblock-recursive
    #     grub_device: true
    #
    #   # EFI Partition
    #   - id: efi-partition
    #     type: partition
    #     device: disk0
    #     size: 512M
    #     flag: boot
    #   - id: efi-format
    #     type: format
    #     fstype: fat32
    #     volume: efi-partition
    #   - id: efi-mount
    #     type: mount
    #     path: /boot/efi
    #     device: efi-format
    #
    #   # Root Partition
    #   - id: root-partition
    #     type: partition
    #     device: disk0
    #     size: -1
    #   - id: root-format
    #     type: format
    #     fstype: btrfs
    #     volume: root-partition
    #   - id: root-mount
    #     type: mount
    #     path: /
    #     device: root-format
    #     options: "compress=zstd,noatime"

  locale: en_US.UTF-8
  keyboard:
    layout: us

  source:
    id: ubuntu-desktop # Extended selection
  drivers: # 3rd party Graphics & Wifi software
    install: true
  updates: all

  packages:
    - build-essential
    - pkg-config
    - libfuse2t64    # Needed for appimage compatibility
    # - openjdk-25-jre # needed to run .jar files - pre-installed
    - sshfs
    - zsh
    - nala
    - curl
    # Flatpak package manager
    - flatpak
    - gnome-software-plugin-flatpak
    # Will be uninstalled later in favor of nixpkgs
    - git
    - stow

  late-commands:
    - curtin in-target --target=/target -- bash -c "dpkg --add-architecture i386; apt-get update"

    - curtin in-target --target=/target -- flatpak remote-add --system --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

    - curtin in-target --target=/target -- usermod -s /usr/bin/zsh eloquencer

