#cloud-config
autoinstall:
  version: 1

  timezone: America/New_York

  identity:
    realname: eloquencer
    hostname: dev-machine
    username: eloquencer
    password: ""

  network:
    version: 2
    renderer: NetworkManager
    ethernets:
      wired:
        match:
          name: "en*"
        dhcp4: true
        nameservers:
          addresses:
            - 1.1.1.2 # Cloudflare
            - 2606:4700:4700::1112 # Cloudflare
            - 1.0.0.2              # "
            - 2606:4700:4700::1002 # "
            - 8.8.8.8              # Google
            - 2001:4860:4860::8888 # Google
            - 8.8.4.4              # "
            - 2001:4860:4860::8844 # "
            - 9.9.9.9              # Quad9
            - 2620:fe::fe          # "
    # wifis:
    #   wifi:
    #     match:
    #       name: "wl*"
    #     dhcp4: true
    #     nameservers:
    #       addresses:
    #         - 1.1.1.2 # Cloudflare
    #         - 2606:4700:4700::1112 # Cloudflare
    #         - 1.0.0.2              # "
    #         - 2606:4700:4700::1002 # "
    #         - 8.8.8.8              # Google
    #         - 2001:4860:4860::8888 # Google
    #         - 8.8.4.4              # "
    #         - 2001:4860:4860::8844 # "
    #         - 9.9.9.9              # Quad9
    #         - 2620:fe::fe          # "

  # For BIOS
  storage:
    config:
      - id: disk0
        type: disk
        match:
          size: largest
        ptable: gpt
        wipe: superblock-recursive
        grub_device: true

      # BIOS GRUB partition (required for GPT + BIOS)
      - id: bios-grub
        type: partition
        device: disk0
        size: 1M
        flag: bios_grub

      # Root partition (rest of disk)
      - id: root-partition
        type: partition
        device: disk0
        size: -1

      # Format as ext4
      - id: root-format
        type: format
        fstype: ext4
        volume: root-partition

      # Mount root
      - id: root-mount
        type: mount
        path: /
        device: root-format
        options: "noatime,errors=remount-ro"

  locale: en_US.UTF-8
  keyboard:
    layout: us

  source:
    id: ubuntu-desktop # Extended selection
  drivers: # 3rd party Graphics & Wifi software
    install: true
  updates: all

  packages:
    - build-essential
    - pkg-config
    - sshfs
    - zsh
    - nala
    - curl
    - libfuse2t64    # For appimage compatibility
    - openjdk-25-jre # To run .jar files
    - libreoffice-java-common
    # Flatpak package manager
    - flatpak
    - gnome-software-plugin-flatpak
    # Will be uninstalled later in favor of nixpkgs
    - git
    - stow

  shutdown: reboot

  late-commands:
    - curtin in-target --target=/target -- bash -c "dpkg --add-architecture i386; apt-get update"

    - curtin in-target --target=/target -- flatpak remote-add --system --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

    - curtin in-target --target=/target -- usermod -s /usr/bin/zsh eloquencer

